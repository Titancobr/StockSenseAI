{% extends "base.html" %}
{% block title %}Login | StockSense AI{% endblock %}
{% block content %}
<section class="auth-section section">
  <div class="auth-panel glass reveal">
    <div class="eyebrow"><span></span> Customer login</div>
    <h1>Welcome back.</h1>
    <p>Log in to keep each customer's stock analyses private and easy to review later.</p>
    <form class="auth-form" method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="next" value="{{ next or '' }}">
      <label>Email<input type="email" name="email" value="{{ email or '' }}" required autocomplete="email"></label>
      <label>Password<input type="password" name="password" required autocomplete="current-password"></label>
      <button class="button button-primary" type="submit">Login <span>→</span></button>
    </form>
    <div class="oauth-grid">
      <a class="oauth-button" href="{{ url_for('oauth_login', provider='google') }}">Continue with Google</a>
      <a class="oauth-button" href="{{ url_for('oauth_login', provider='apple') }}">Continue with Apple</a>
    </div>
    <p class="auth-switch">New here? <a href="{{ url_for('signup') }}">Create an account</a></p>
  </div>
</section>
{% endblock %}
